global:
  image:
    tag: "1.14.0"
  storageClass: ""

api:
  replicaCount: 1
  image:
    repository: langgenius/dify-api
    tag: "1.14.0"

web:
  replicaCount: 1
  image:
    repository: langgenius/dify-web
    tag: "1.14.0"

worker:
  replicaCount: 1
  image:
    repository: langgenius/dify-worker
    tag: "1.14.0"

pluginDaemon:
  replicaCount: 1
  image:
    repository: langgenius/dify-plugin-daemon
    tag: "1.14.0"

postgresql:
  enabled: true

redis:
  enabled: true

weaviate:
  enabled: true

ingress:
  enabled: false

persistence:
  enabled: true
  size: 10Gi

env:
  SECRET_KEY: "change-this-to-a-long-random-string"
  STORAGE_TYPE: "local"
  VECTOR_STORE: "weaviate"