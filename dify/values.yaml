global:
  storageClass: standard
  storageType: local   # 👈 ADD THIS

api:
  image:
    tag: "1.14.0-rc1"
  extraEnv:
    - name: STORAGE_TYPE
      value: local      # 👈 ADD THIS

web:
  image:
    tag: "1.14.0-rc1"

