global:
  storageClass: standard
  storageType: local   # 👈 ADD THIS

api:
  extraEnv:
    - name: FILESYSTEM_STORAGE_TYPE
      value: local

    - name: STORAGE_TYPE
      value: local

    - name: S3_ENABLED
      value: "false"


web:
  image:
    tag: "1.14.0-rc1"

worker:
  extraEnv:
    - name: FILESYSTEM_STORAGE_TYPE
      value: local

    - name: STORAGE_TYPE
      value: local

    - name: S3_ENABLED
      value: "false"
pluginDaemon:
  image:
    tag: "1.14.0-rc1"

persistence:
  enabled: true
  size: 10Gi