global:
  storageClass: standard
  storageType: "local"

  image:
    tag: "1.14.0-rc1"

  extraBackendEnvs:
    - name: SECRET_KEY
      value: "replace-with-your-own-secret-key"

    # 🔥 CRITICAL: force local storage (fixes your crash)
    - name: STORAGE_TYPE
      value: "local"

    - name: FILESYSTEM_STORAGE_TYPE
      value: "local"

    # Optional: disable any accidental S3 usage
    - name: S3_ENABLED
      value: "false"

    # Optional (safe defaults)
    - name: VECTOR_STORE
      value: ""

    - name: WEAVIATE_ENDPOINT
      value: ""

    - name: WEAVIATE_API_KEY
      value: ""

api:
  image:
    tag: "1.14.0-rc1"

  podSecurityContext:
    fsGroup: 1000

web:
  image:
    tag: "1.14.0-rc1"

worker:
  image:
    tag: "1.14.0-rc1"

  podSecurityContext:
    fsGroup: 1000

  extraEnv:
    - name: PUBSUB_REDIS_CHANNEL_TYPE
      value: "pubsub"

pluginDaemon:
  image:
    tag: "1.14.0-rc1"

sandbox:
  image:
    repository: svcvit/dify-sandbox-py
    tag: "0.1.4"

persistence:
  enabled: true
  size: 10Gi

# (Optional) Ingress — only if you want browser access
ingress:
  enabled: false